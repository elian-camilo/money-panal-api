services:
  db:
    image: postgres:16-alpine
    container_name: my_money_panal_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  db_test:
    image: postgres:16-alpine
    container_name: my_money_panal_db_test
    restart: always
    environment:
      POSTGRES_USER: tester
      POSTGRES_PASSWORD: test123
      POSTGRES_DB: testing_db
    ports:
      - "5433:5432"

volumes:
  pgdata:
