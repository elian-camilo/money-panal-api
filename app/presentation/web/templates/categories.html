{% extends 'layout.html' %}

{% block content %}
<div class="container mt-5 pt-3">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h2 class="mb-0 fw-bold">Categories</h2>
                <button class="btn btn-honey btn-sm shadow-sm px-3">
                    <i class="bi bi-plus-lg me-1"></i> New Category
                </button>
            </div>

            <div class="card shadow-sm border-0">
                <div class="table-responsive">
                    <table class="table table-hover table-sm border-0 mb-0 align-middle">
                        <thead class="table-light text-muted">
                            <tr>
                                <th class="py-3 px-4 border-0">Name</th>
                                <th class="py-3 px-4 border-0 text-center">Preview</th>
                                <th class="py-3 px-4 border-0 text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="border-top-0">
                            {% for category in categories %}
                            <tr>
                                <td class="py-3 px-4 fw-medium text-dark">{{ category.name }}</td>
                                <td class="py-3 px-4 text-center">
                                    <!-- Badge simulating the transaction list preview -->
                                    <span class="badge bg-light text-dark border shadow-sm px-3 py-2 rounded-pill">{{ category.name }}</span>
                                </td>
                                <td class="py-3 px-4 text-end">
                                    <button type="button" class="btn btn-sm btn-outline-secondary" title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                </td>
                            </tr>
                            {% endfor %}
                            
                            {% if not categories %}
                            <tr>
                                <td colspan="3" class="text-center text-muted py-5">
                                    <i class="bi bi-tags display-4 text-light mb-3"></i>
                                    <p class="mb-0">No categories yet. Add a new one!</p>
                                </td>
                            </tr>
                            {% endif %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
