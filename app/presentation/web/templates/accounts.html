{% extends 'layout.html' %}

{% block content %}
<div class="container mt-5 pt-3">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
        <h2 class="mb-0 fw-bold">My Accounts</h2>
        <button class="btn btn-honey btn-sm shadow-sm px-3">
            <i class="bi bi-plus-lg me-1"></i> New Account
        </button>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for account in accounts %}
        <div class="col">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <h5 class="card-title text-muted fw-semibold mb-3">{{ account.name }}</h5>
                    <h2 class="fw-bold mb-0" style="color: var(--hive-dark)">${{ account.balance }}</h2>
                </div>
                <div class="card-footer bg-white border-0 text-center pb-4 pt-0">
                    <button class="btn btn-sm btn-outline-secondary px-4 rounded-pill shadow-sm">
                        <i class="bi bi-pencil me-1"></i> Edit
                    </button>
                </div>
            </div>
        </div>
        {% endfor %}
        
        {% if not accounts %}
        <div class="col-12 text-center text-muted py-5">
            <i class="bi bi-wallet2 display-1 text-light mb-3"></i>
            <p class="fs-5">No accounts found. Create one to start tracking!</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
