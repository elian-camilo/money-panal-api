{% extends 'layout.html' %}

{% block content %}
<div class="container min-vh-100 d-flex justify-content-center align-items-center mt-n5">
    <div class="card shadow-sm border-0 w-100" style="max-width: 400px; border-top: 4px solid var(--honey-gold) !important;">
        <div class="card-body p-4 p-md-5 text-center">
            <img src="{{ url_for('static', path='/img/logo.svg') }}" alt="Money-panal Logo" width="100" height="100" class="mb-3">
            <h3 class="mb-4 fw-bold">Login</h3>
            <form id="loginForm" class="text-start">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="username" name="username" placeholder="name@example.com" autocomplete="email" required>
                    <label for="username">Email</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" autocomplete="current-password" required>
                    <label for="password">Password</label>
                </div>
                <button type="submit" class="btn btn-honey w-100 py-2 shadow-sm">Sign In</button>
            </form>
            <div class="text-center mt-4">
                <a href="/register-page" class="text-decoration-none text-muted">Don't have an account? Register</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
