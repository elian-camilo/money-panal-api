{% include "layout.html" %}

<div class="container">
    <div class="card">
        <div class="card text-center">
            <div class="card-header">
                Your Transactions!
            </div>
            <div class="card-body">
                <h5 class="card-title">
                    List of your transactions!
                </h5>
                <p class="card-text">
                    Information regarding stuff that needs to be complete
                </p>

                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">Info</th>
                            <th scope="col">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for transaction in transactions %}
                        <tr class="pointer">
                            <td>{{loop.index}}</td>
                            <td>{{transaction.description}}</td>
                            <td>
                                <button onclick="window.location.href='edit-transaction-page/{{transaction.id}}'" 
                                type="button" class="btn btn-info">
                                    Edit
                                </button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                <a href="add-transaction-page" class="btn btn-primary">Add a new transaction!</a>
            </div>
        </div>
    </div>
</div>
